name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.35.3'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Create debug keystore for signing
        run: |
          keytool -genkey -v -keystore android/app/debug.keystore \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias androiddebugkey \
            -storepass android -keypass android \
            -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, S=Debug, C=US"
          
          cat > android/key.properties << PROPS
          storePassword=android
          keyPassword=android
          keyAlias=androiddebugkey
          storeFile=debug.keystore
          PROPS

      - name: Build Release APK
        run: |
          flutter build apk --release --split-per-abi
          
      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          mv app-arm64-v8a-release.apk Anx-Reader-MiMo-arm64.apk || true
          mv app-armeabi-v7a-release.apk Anx-Reader-MiMo-armeabi.apk || true
          mv app-x86_64-release.apk Anx-Reader-MiMo-x86_64.apk || true

      - name: Upload ARM64 APK
        uses: actions/upload-artifact@v4
        with:
          name: anx-reader-mimo-arm64
          path: build/app/outputs/flutter-apk/Anx-Reader-MiMo-arm64.apk
          if-no-files-found: warn

      - name: Upload ARM APK
        uses: actions/upload-artifact@v4
        with:
          name: anx-reader-mimo-armeabi
          path: build/app/outputs/flutter-apk/Anx-Reader-MiMo-armeabi.apk
          if-no-files-found: warn

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: anx-reader-mimo-x86_64
          path: build/app/outputs/flutter-apk/Anx-Reader-MiMo-x86_64.apk
          if-no-files-found: warn
