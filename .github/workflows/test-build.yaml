name: Test Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - macos
          - windows
      flutter_version:
        description: 'Flutter version (leave empty for default)'
        required: false
        default: '3.35.3'
        type: string
  push:
    tags:
      - 'test/*'

permissions:
  contents: write

jobs:
  setup:
    uses: ./.github/workflows/setup.yaml
    secrets:
      NOTIFICATION_URL: ${{ secrets.NOTIFICATION_URL }}

  build-android:
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.platform == 'android' ||
      startsWith(github.ref, 'refs/tags/test/')
    needs: setup
    uses: ./.github/workflows/build-android.yaml
    with:
      version: ${{ needs.setup.outputs.version }}-test.${{ github.run_number }}
      flutter_version: ${{ github.event.inputs.flutter_version || needs.setup.outputs.flutter_version }}
    secrets:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

  build-ios:
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.platform == 'ios' ||
      startsWith(github.ref, 'refs/tags/test/')
    needs: setup
    uses: ./.github/workflows/build-ios.yaml
    with:
      version: ${{ needs.setup.outputs.version }}-test.${{ github.run_number }}
      flutter_version: ${{ github.event.inputs.flutter_version || needs.setup.outputs.flutter_version }}
      xcode_version: ${{ needs.setup.outputs.xcode_version }}

  build-macos:
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.platform == 'macos' ||
      startsWith(github.ref, 'refs/tags/test/')
    needs: setup
    uses: ./.github/workflows/build-macos.yaml
    with:
      version: ${{ needs.setup.outputs.version }}-test.${{ github.run_number }}
      flutter_version: ${{ github.event.inputs.flutter_version || needs.setup.outputs.flutter_version }}
      xcode_version: ${{ needs.setup.outputs.xcode_version }}

  build-windows:
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.platform == 'windows' ||
      startsWith(github.ref, 'refs/tags/test/')
    needs: setup
    uses: ./.github/workflows/build-windows.yaml
    with:
      version: ${{ needs.setup.outputs.version }}-test.${{ github.run_number }}
      flutter_version: ${{ github.event.inputs.flutter_version || needs.setup.outputs.flutter_version }}
    secrets:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      NOTIFICATION_URL: ${{ secrets.NOTIFICATION_URL }}
